    .page-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 100px 0 50px 0; text-align: center; }

    .detail-desc { font-size: 1.05rem; color: #475569; line-height: 1.8; margin-bottom: 30px; white-space: pre-line; }
    
    .detail-viewer { padding: 40px; background: #f8fafc; text-align: center; }
    .pdf-container { width: 100%; height: 70vh; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 25px; background: white; }
    
    .btn-download-large { padding: 15px 40px; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; border-radius: 50px; }
    
    @media (max-width: 768px) {
      .detail-header { flex-direction: column; align-items: center; text-align: center; }
      .detail-meta { justify-content: center; }
