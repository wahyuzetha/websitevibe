<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Pembelajaran - SMK Karya Nugraha Boyolali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=4">
  <style>
    .page-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 100px 0 50px 0; text-align: center; }
    .page-header h1 { font-size: 2.5rem; margin-bottom: 15px; }
    .page-header p { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }
    .materi-page-container { padding: 60px 0; }
    .materi-list-full { display: flex; flex-direction: column; gap: 40px; max-width: 900px; margin: 0 auto; }
    .materi-card-full { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; border: 1px solid #f1f5f9; }
    .materi-card-full .img-wrapper { width: 100%; height: 300px; background-color: #f8fafc; }
    .materi-card-full img { width: 100%; height: 100%; object-fit: cover; }
    .materi-card-full .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; color: #cbd5e1; }
    .materi-card-full .content { padding: 30px; }
    .materi-card-full h3 { font-size: 1.8rem; color: var(--primary-color); margin-bottom: 15px; }
    .materi-card-full .date { font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px; display: block; }
    .materi-card-full p { color: var(--text-color); line-height: 1.7; margin-bottom: 30px; white-space: pre-line; }
    .materi-card-full .btn-download { display: inline-flex; align-items: center; gap: 10px; font-weight: 600; padding: 12px 30px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar" class="navbar scrolled">
    <div class="container nav-container">
      <div class="logo">
        <span class="logo-text" id="navbar_school_name">SMK KN <span class="highlight">Telkom</span></span>
      </div>
      <ul class="nav-links">
        <li><a href="/">Beranda</a></li>
        <li><a href="/#tentang">Tentang Jurusan</a></li>
        <li><a href="/#galeri">Galeri</a></li>
        <li><a href="#" class="active">Materi</a></li>
        <li><a href="/#kontak">Kontak</a></li>
      </ul>
      <a href="/#daftar" class="btn btn-primary cta-btn">Daftar Sekarang</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>Materi Pembelajaran</h1>
      <p>Kumpulan modul, buku panduan, dan materi belajar interaktif Jurusan Telkom.</p>
    </div>
  </div>

  <section class="materi-page-container bg-light">
    <div class="container">
      <div class="materi-list-full" id="materi_page_container">
        <div style="text-align: center; padding: 50px;">Memuat materi...</div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Jurusan Telkom SMK Karya Nugraha Boyolali. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/content/all');
            const result = await res.json();
            
            if (result.success && result.data) {
                const settings = result.data.settings;
                if(settings.school_name) {
                    const el = document.getElementById('navbar_school_name');
                    if(el) el.innerHTML = settings.school_name + ' <span class="highlight">Telkom</span>';
                }

                const container = document.getElementById('materi_page_container');
                const materials = result.data.materials;

                if (materials && materials.length > 0) {
                    container.innerHTML = materials.map(item => {
                        const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
                        return `
                        <div class="materi-card-full">
                            <div class="img-wrapper">
                                ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title}">` : `<div class="no-img">📄</div>`}
                            </div>
                            <div class="content">
                                <h3>${item.title}</h3>
                                <span class="date">Diunggah pada: ${dateStr}</span>
                                <p>${item.description}</p>
                                <a href="${item.fileUrl}" class="btn btn-primary btn-download" target="_blank" download>⬇️ Download Materi</a>
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 50px; color:#64748b;">Belum ada materi pembelajaran yang diunggah.</div>';
                }
            }
        } catch(err) {
            console.error('Failed to load materials:', err);
            document.getElementById('materi_page_container').innerHTML = '<div style="text-align: center; padding: 50px; color:red;">Gagal memuat materi. Pastikan server aktif.</div>';
        }
    });
  </script>
</body>
</html>
